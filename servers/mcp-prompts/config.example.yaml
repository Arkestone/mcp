# MCP Prompts Server Configuration

sources:
  # Local directories containing .github/prompts/*.prompt.md
  # and .github/chatmodes/*.chatmode.md files
  dirs:
    - ./my-repo

  # GitHub repositories (owner/repo or owner/repo@ref)
  repos:
    - github/awesome-copilot

cache:
  dir: ~/.cache/mcp-prompts
  sync_interval: 5m

llm:
  endpoint: ""
  model: gpt-4o-mini
  enabled: false

transport: stdio
addr: ":8082"
