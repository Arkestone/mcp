name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure '...'
        2. Run '...'
        3. Send request '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go Version
      description: Output of `go version`.
      placeholder: "go1.21.0"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      description: OS and version.
      placeholder: "Ubuntu 22.04 / macOS 14 / Windows 11"
    validations:
      required: false

  - type: dropdown
    id: transport-type
    attributes:
      label: Transport Type
      description: Which transport are you using?
      options:
        - stdio
        - http
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Share your config.yaml (redact any sensitive values).
      render: yaml
    validations:
      required: false
