name: Benchmark Trend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CGO_ENABLED: '0'
  GOFLAGS: '-buildvcs=false'

jobs:
  trend:
    name: Benchmark Trend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=3 -run='^$' ./... 2>&1 | tee benchmark.txt

      - name: Check for benchmark results
        id: check
        run: |
          if grep -q '^Benchmark' benchmark.txt; then
            echo "has_benchmarks=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_benchmarks=false" >> "$GITHUB_OUTPUT"
            echo "No benchmark functions found — trend storage skipped"
          fi

      - name: Store benchmark result
        if: steps.check.outputs.has_benchmarks == 'true'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Go Benchmarks
          tool: go
          output-file-path: benchmark.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '120%'
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: dev/bench
