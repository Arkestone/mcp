name: Container Image Scan

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Scan — ${{ matrix.server }}
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server:
          - mcp-instructions
          - mcp-skills
          - mcp-adr
          - mcp-memory
          - mcp-prompts
          - mcp-graph
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq && sudo apt-get install -y trivy

      - name: Scan image
        run: |
          trivy image \
            --format sarif \
            --output trivy-${{ matrix.server }}.sarif \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            ghcr.io/arkestone/${{ matrix.server }}:latest

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.server }}.sarif
          category: trivy-container-${{ matrix.server }}

  summary:
    name: Container Scan Summary
    if: always() && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - name: Result
        run: |
          if [ "${{ needs.scan.result }}" = "success" ]; then
            echo "✅ All container scans completed — check the Security tab for results"
          else
            echo "⚠️ One or more container scans failed"
            exit 1
          fi
