name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  trivy:
    name: Container Scan (${{ matrix.server }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server:
          - mcp-instructions
          - mcp-skills
          - mcp-adr
          - mcp-memory
          - mcp-prompts
          - mcp-graph
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.server }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: servers/${{ matrix.server }}/Dockerfile
          push: false
          load: true
          tags: arkestone/${{ matrix.server }}:scan
          cache-from: type=gha,scope=${{ matrix.server }}
      - name: Run Trivy (${{ matrix.server }})
        uses: aquasecurity/trivy-action@0.31.0
        with:
          image-ref: arkestone/${{ matrix.server }}:scan
          format: sarif
          output: trivy-${{ matrix.server }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
      - name: Upload SARIF (${{ matrix.server }})
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.server }}.sarif
          category: trivy-${{ matrix.server }}

  scorecard:
    name: OSSF Scorecard
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard-results.sarif
