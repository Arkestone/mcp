name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  trivy-instructions:
    name: Container Scan (mcp-instructions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq && sudo apt-get install -y trivy
      - name: Build mcp-instructions image
        run: docker build -f servers/mcp-instructions/Dockerfile -t arkestone/mcp-instructions:scan .
      - name: Run Trivy (mcp-instructions)
        run: trivy image --format sarif --output trivy-instructions.sarif --severity CRITICAL,HIGH --exit-code 0 arkestone/mcp-instructions:scan
      - name: Upload SARIF (mcp-instructions)
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-instructions.sarif') != ''
        with:
          sarif_file: trivy-instructions.sarif

  trivy-skills:
    name: Container Scan (mcp-skills)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq && sudo apt-get install -y trivy
      - name: Build mcp-skills image
        run: docker build -f servers/mcp-skills/Dockerfile -t arkestone/mcp-skills:scan .
      - name: Run Trivy (mcp-skills)
        run: trivy image --format sarif --output trivy-skills.sarif --severity CRITICAL,HIGH --exit-code 0 arkestone/mcp-skills:scan
      - name: Upload SARIF (mcp-skills)
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-skills.sarif') != ''
        with:
          sarif_file: trivy-skills.sarif

  scorecard:
    name: OSSF Scorecard
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard-results.sarif
