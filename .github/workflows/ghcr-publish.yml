name: GHCR Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. 1.0.0 — without the v prefix)'
        required: false
        default: 'latest'

permissions:
  packages: write   # write:packages scope — required to push and update visibility

jobs:
  publish:
    name: Make GHCR packages public
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image visibility to public
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          echo "### 📦 GHCR Visibility Update" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag: \`${TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          FAILED=0
          for pkg in mcp-instructions mcp-skills mcp-prompts mcp-adr mcp-memory mcp-graph; do
            RESPONSE=$(gh api --method PATCH \
              "/orgs/${{ github.repository_owner }}/packages/container/${pkg}" \
              -f visibility=public \
              -i --silent 2>&1 || true)
            STATUS=$(echo "$RESPONSE" | head -1 | grep -oE '[0-9]{3}' | head -1 || echo "000")

            case "${STATUS}" in
              200|204)
                echo "✓ ${pkg} → public"
                echo "| \`${pkg}\` | ✅ public |" >> "$GITHUB_STEP_SUMMARY"
                ;;
              404)
                echo "⚠ ${pkg}: package not found — image may not have been pushed yet"
                echo "| \`${pkg}\` | ⚠️ not found |" >> "$GITHUB_STEP_SUMMARY"
                ;;
              *)
                echo "✗ ${pkg}: unexpected HTTP ${STATUS}"
                echo "| \`${pkg}\` | ❌ HTTP ${STATUS} |" >> "$GITHUB_STEP_SUMMARY"
                FAILED=1
                ;;
            esac
          done

          if [ "${FAILED}" -eq 1 ]; then
            echo ""
            echo "Some packages failed. Set a **PACKAGES_TOKEN** org secret (classic PAT with \`write:packages\` + \`read:org\` scopes) to override the default GITHUB_TOKEN."
            exit 1
          fi
