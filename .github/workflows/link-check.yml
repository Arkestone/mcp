name: Link Check

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    paths:
      - '**/*.md'
      - 'docs/**'
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC (catches externally broken links)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linkcheck:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links with lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Scan all markdown files
          args: >
            --verbose
            --no-progress
            --timeout 20
            --max-retries 3
            --accept 200,206,429
            --exclude 'https://github\.com/Arkestone/mcp/compare/.*'
            --exclude 'https://pkg\.go\.dev/.*'
            --exclude 'https://insiders\.vscode\.dev/.*'
            --exclude '^file://'
            --exclude 'mailto:'
            --exclude-loopback
            --exclude-path 'website/'
            --exclude-path 'CHANGELOG\.md'
            '**/*.md'
          fail: true
          jobSummary: true
