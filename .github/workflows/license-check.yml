name: License Compliance

on:
  push:
    branches: [main]
    paths:
      - 'go.mod'
      - 'go.sum'
  pull_request:
    paths:
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

env:
  CGO_ENABLED: '0'
  GOFLAGS: '-buildvcs=false'

jobs:
  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: Check dependency licenses
        run: |
          go-licenses check \
            --allowed_licenses="MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0,Unlicense,CC0-1.0,0BSD" \
            ./...

      - name: Save license report
        if: always()
        run: go-licenses csv ./... > licenses.csv 2>&1 || true

      - name: Upload license report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: license-report
          path: licenses.csv
          retention-days: 30
