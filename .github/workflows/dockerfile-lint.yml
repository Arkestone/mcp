name: Dockerfile Lint

on:
  push:
    branches: [main]
    paths:
      - 'servers/*/Dockerfile'
  pull_request:
    paths:
      - 'servers/*/Dockerfile'

permissions:
  contents: read

jobs:
  hadolint:
    name: Hadolint (${{ matrix.server }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server:
          - mcp-instructions
          - mcp-skills
          - mcp-adr
          - mcp-memory
          - mcp-prompts
          - mcp-graph

    steps:
      - uses: actions/checkout@v4

      - name: Lint ${{ matrix.server }}/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: servers/${{ matrix.server }}/Dockerfile
          # DL3018: pin apk package versions — acceptable for base image updates
          # DL3059: multiple consecutive RUN — intentional for layer clarity
          # DL3007: unpinned tag in setup-only stages — acceptable risk
          ignore: DL3018,DL3059,DL3007
          failure-threshold: warning
