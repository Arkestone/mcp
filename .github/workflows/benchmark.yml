name: Benchmarks

on:
  schedule:
    - cron: '0 4 * * 1'  # Weekly on Monday at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  CGO_ENABLED: '0'
  GOFLAGS: '-buildvcs=false'

jobs:
  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks
        run: go test -bench=. -benchmem -benchtime=3s -count=3 ./... 2>&1 | tee benchmark.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-${{ github.sha }}
          path: benchmark.txt
          retention-days: 90

      - name: Summarise results
        run: |
          echo "## Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if grep -q "^Benchmark" benchmark.txt; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E "^Benchmark|^---" benchmark.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No benchmarks found in any package._" >> "$GITHUB_STEP_SUMMARY"
          fi
