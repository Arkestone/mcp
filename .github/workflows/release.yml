name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist)'
        required: true

permissions:
  contents: write
  packages: write
  id-token: write       # Required for Cosign OIDC keyless signing
  attestations: write   # Required for SLSA provenance attestation

env:
  CGO_ENABLED: '0'
  GOFLAGS: '-buildvcs=false'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Delete existing release (re-run only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          # Delete the entire release so goreleaser creates a fresh one.
          # This avoids 422 already_exists errors when goreleaser retries parallel uploads.
          RELEASE_ID=$(gh api "/repos/${{ github.repository }}/releases/tags/${TAG}" --jq '.id' 2>/dev/null || true)
          if [ -z "${RELEASE_ID}" ]; then
            echo "No existing release found for ${TAG}, goreleaser will create it"
          else
            gh api --method DELETE "/repos/${{ github.repository }}/releases/${RELEASE_ID}" --silent
            echo "Deleted release ${RELEASE_ID} for ${TAG} — goreleaser will recreate it"
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Make GHCR packages public
        # GITHUB_TOKEN cannot change org package visibility (requires admin:org).
        # Set PACKAGES_TOKEN org secret (PAT with write:packages + read:org scopes)
        # to enable automatic public visibility. Without it, run manually:
        # https://github.com/orgs/Arkestone/packages
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::PACKAGES_TOKEN not set — images pushed but remain private. Set the secret or update visibility manually."
            exit 0
          fi
          for pkg in mcp-instructions mcp-skills mcp-prompts mcp-adr mcp-memory mcp-graph; do
            gh api --method PATCH \
              "/orgs/${{ github.repository_owner }}/packages/container/${pkg}" \
              -f visibility=public \
              --silent && echo "✓ $pkg → public" || echo "⚠ $pkg: API call failed (may already be public)"
          done

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker images (keyless OIDC)
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          # Goreleaser strips the 'v' prefix — tag is '1.0.0', not 'v1.0.0'
          DOCKER_TAG="${RELEASE_TAG#v}"
          for server in mcp-instructions mcp-skills mcp-adr mcp-memory mcp-prompts mcp-graph; do
            IMAGE="ghcr.io/arkestone/${server}:${DOCKER_TAG}"
            # Verify image is accessible before signing
            if ! docker buildx imagetools inspect "${IMAGE}" --format '{{.Manifest.MediaType}}' 2>/dev/null | grep -q 'manifest'; then
              echo "::error::Image ${IMAGE} not found or not accessible after goreleaser"
              exit 1
            fi
            # Sign by tag — cosign resolves digest internally, works with multi-arch OCI indexes
            cosign sign --yes "${IMAGE}"
            echo "✓ Signed ${IMAGE}"
          done

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: dist/
          format: spdx-json
          artifact-name: sbom-binaries.spdx.json
          output-file: sbom-binaries.spdx.json

      - name: Attach SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: gh release upload "${RELEASE_TAG}" sbom-binaries.spdx.json --clobber

      - name: Attest build provenance (SLSA L3)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
