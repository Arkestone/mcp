name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist)'
        required: true

permissions:
  contents: write
  packages: write
  id-token: write       # Required for Cosign OIDC keyless signing
  attestations: write   # Required for SLSA provenance attestation

env:
  CGO_ENABLED: '0'
  GOFLAGS: '-buildvcs=false'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Delete existing release assets (re-run only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          echo "Cleaning up existing assets for ${TAG} to allow goreleaser to re-upload…"
          ASSET_IDS=$(gh release view "${TAG}" --repo "${{ github.repository }}" \
            --json assets --jq '.assets[].apiUrl | split("/") | last' 2>/dev/null || true)
          if [ -z "${ASSET_IDS}" ]; then
            echo "No existing assets found"
          else
            while IFS= read -r id; do
              [ -z "$id" ] && continue
              gh api --method DELETE "/repos/${{ github.repository }}/releases/assets/${id}" --silent
              echo "  Deleted asset ${id}"
            done <<< "${ASSET_IDS}"
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Make GHCR packages public
        # GITHUB_TOKEN cannot change org package visibility (requires admin:org).
        # Set PACKAGES_TOKEN org secret (PAT with write:packages + read:org scopes)
        # to enable automatic public visibility. Without it, run manually:
        # https://github.com/orgs/Arkestone/packages
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::PACKAGES_TOKEN not set — images pushed but remain private. Set the secret or update visibility manually."
            exit 0
          fi
          for pkg in mcp-instructions mcp-skills mcp-prompts mcp-adr mcp-memory mcp-graph; do
            gh api --method PATCH \
              "/orgs/${{ github.repository_owner }}/packages/container/${pkg}" \
              -f visibility=public \
              --silent && echo "✓ $pkg → public" || echo "⚠ $pkg: API call failed (may already be public)"
          done

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker images (keyless OIDC)
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          # Goreleaser strips the 'v' prefix — tag is '1.0.0', not 'v1.0.0'
          DOCKER_TAG="${RELEASE_TAG#v}"
          for server in mcp-instructions mcp-skills mcp-adr mcp-memory mcp-prompts mcp-graph; do
            IMAGE="ghcr.io/arkestone/${server}"
            DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${DOCKER_TAG}" \
              --format '{{.Manifest.Digest}}' 2>/dev/null || true)
            if [ -n "${DIGEST}" ]; then
              cosign sign --yes "${IMAGE}@${DIGEST}"
              echo "✓ Signed ${IMAGE}@${DIGEST}"
            else
              echo "::error::Could not get digest for ${IMAGE}:${DOCKER_TAG} — image missing after goreleaser?"
              exit 1
            fi
          done

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: dist/
          format: spdx-json
          artifact-name: sbom-binaries.spdx.json
          output-file: sbom-binaries.spdx.json

      - name: Attach SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: gh release upload "${RELEASE_TAG}" sbom-binaries.spdx.json --clobber

      - name: Attest build provenance (SLSA L3)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
