name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  CGO_ENABLED: '0'
  GOFLAGS: '-buildvcs=false'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Make GHCR packages public
        # Requires a PAT with write:packages scope stored as PACKAGES_TOKEN org secret.
        # GITHUB_TOKEN cannot change org package visibility.
        # To create manually: https://github.com/orgs/Arkestone/packages
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "PACKAGES_TOKEN not configured, skipping visibility update"
            exit 0
          fi
          for pkg in mcp-instructions mcp-skills mcp-prompts mcp-adr mcp-memory mcp-graph; do
            gh api --method PATCH \
              /orgs/Arkestone/packages/container/$pkg \
              -f visibility=public \
              --silent && echo "✓ $pkg → public" || echo "⚠ $pkg: API call failed"
          done
