name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Go vet
        run: go vet ./...
      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files not formatted:"
            gofmt -l .
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.24.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...
      - name: Coverage summary
        run: |
          total=$(go tool cover -func=coverage.out | grep ^total | awk '{print $3}')
          echo "Total coverage: $total"
          pct=${total%\%}
          if awk "BEGIN { exit !($pct < 60) }"; then
            echo "::warning title=Low Coverage::Coverage is $total (below 60%)"
          fi
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.go-version }}
          path: coverage.out
      - name: Upload to Codecov
        if: matrix.go-version == '1.24.x'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-integration:
    name: Integration Tests
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Run integration tests
        run: go test -tags integration -race -count=1 ./...

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Build binaries
        run: |
          CGO_ENABLED=0 go build -o mcp-instructions ./servers/mcp-instructions/cmd/mcp-instructions
          CGO_ENABLED=0 go build -o mcp-skills ./servers/mcp-skills/cmd/mcp-skills
          CGO_ENABLED=0 go build -o mcp-adr ./servers/mcp-adr/cmd/mcp-adr
          CGO_ENABLED=0 go build -o mcp-memory ./servers/mcp-memory/cmd/mcp-memory
          CGO_ENABLED=0 go build -o mcp-prompts ./servers/mcp-prompts/cmd/mcp-prompts
          CGO_ENABLED=0 go build -o mcp-graph ./servers/mcp-graph/cmd/mcp-graph
      - name: Verify binaries
        run: |
          ./mcp-instructions --help || true
          ./mcp-skills --help || true
          ./mcp-adr --help || true
          ./mcp-memory --help || true
          ./mcp-prompts --help || true
          ./mcp-graph --help || true

  docker:
    name: Docker Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build mcp-instructions Docker image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: servers/mcp-instructions/Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/arkestone/mcp-instructions:ci
      - name: Build mcp-skills Docker image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: servers/mcp-skills/Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/arkestone/mcp-skills:ci
      - name: Build mcp-adr Docker image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: servers/mcp-adr/Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/arkestone/mcp-adr:ci
      - name: Build mcp-memory Docker image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: servers/mcp-memory/Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/arkestone/mcp-memory:ci
      - name: Build mcp-prompts Docker image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: servers/mcp-prompts/Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/arkestone/mcp-prompts:ci
      - name: Build mcp-graph Docker image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: servers/mcp-graph/Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/arkestone/mcp-graph:ci
