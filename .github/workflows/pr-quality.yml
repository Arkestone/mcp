name: PR Quality

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]

permissions:
  statuses: write
  pull-requests: write
  contents: read

jobs:
  commit-title:
    name: PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          wip: true
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The PR title "{title}" is invalid.
            - Subject must start with a lowercase letter (e.g. "feat: add JSON export")
            - Or use WIP prefix (e.g. "WIP: experimenting with…")

  changelog:
    name: Changelog Check
    runs-on: ubuntu-latest
    steps:
      - name: Check for CHANGELOG update
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title || '';
            const labels = pr.labels.map(l => l.name);
            const marker = '<!-- changelog-check -->';

            const isFeatOrFix =
              /^(feat|fix)[\(:]/i.test(title) ||
              labels.includes('enhancement') ||
              labels.includes('bug');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (!isFeatOrFix) {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
              console.log('Not a feat/fix PR — skipping changelog check');
              return;
            }

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const hasChangelog = files.some(f => f.filename.endsWith('CHANGELOG.md'));
            const prType = /^fix[\(:]/.test(title) ? 'fix' : 'feat';

            if (!hasChangelog) {
              const body = `${marker}\n📋 **Changelog reminder**: This \`${prType}:\` PR doesn't update any \`CHANGELOG.md\`.\n\nPlease add an entry to the relevant server's changelog (e.g. \`servers/mcp-*/CHANGELOG.md\`) or the root \`CHANGELOG.md\`.`;
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body,
                });
              }
              core.warning('feat/fix PR is missing a CHANGELOG.md update');
            } else if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }

  size:
    name: PR Size
    runs-on: ubuntu-latest
    steps:
      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const total = pr.additions + pr.deletions;
            const threshold = 400;
            const marker = '<!-- pr-size-check -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (total > threshold) {
              const body = `${marker}\n⚠️ **Large PR warning**: This PR changes **${total} lines** (+${pr.additions}/-${pr.deletions}), which exceeds the recommended threshold of ${threshold} lines.\n\nConsider breaking this into smaller, focused PRs to make review easier and reduce risk.`;
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body,
                });
              }
              core.warning(`PR is large: ${total} lines changed (threshold: ${threshold})`);
            } else if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }
