name: Conventional Commits

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  statuses: write
  pull-requests: read

jobs:
  lint:
    name: PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed commit types
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          # Allow WIP drafts
          wip: true
          # Subject must not start with uppercase
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The PR title "{title}" is invalid.
            - Subject must start with a lowercase letter (e.g. "feat: add JSON export")
            - Or use WIP prefix (e.g. "WIP: experimenting with…")
