name: Conventional Commits

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  statuses: write
  pull-requests: read

jobs:
  lint:
    name: PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed commit types
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          # Allow WIP prefixes so drafts aren't blocked
          wip: true
          subjectPattern: ^.+$
          subjectPatternError: |
            The PR title "{title}" is missing a description after the type.
            Example: "feat: add JSON export" or "fix(loader): handle empty dirs"
