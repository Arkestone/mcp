name: Container Structure Tests

on:
  pull_request:
    paths:
      - 'servers/**/Dockerfile*'
      - '.github/workflows/container-structure.yml'
  push:
    branches: [main]
    paths:
      - 'servers/**/Dockerfile*'
  schedule:
    - cron: '0 7 * * 1'  # Monday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  structure:
    name: Structure — ${{ matrix.server }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server:
          - mcp-instructions
          - mcp-skills
          - mcp-adr
          - mcp-memory
          - mcp-prompts
          - mcp-graph
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          file: servers/${{ matrix.server }}/Dockerfile
          push: false
          load: true
          tags: local/${{ matrix.server }}:test
          cache-from: type=gha,scope=${{ matrix.server }}-structure
          cache-to: type=gha,mode=max,scope=${{ matrix.server }}-structure

      - name: Install container-structure-test
        run: |
          curl -fsSLo /usr/local/bin/container-structure-test \
            https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64
          chmod +x /usr/local/bin/container-structure-test

      - name: Generate structure test config
        run: |
          cat > structure-test.yml << EOF
          schemaVersion: '2.0.0'
          fileExistenceTests:
            - name: "Binary exists at expected path"
              path: "/usr/local/bin/${{ matrix.server }}"
              shouldExist: true
            - name: "CA certificates present"
              path: "/etc/ssl/certs/ca-certificates.crt"
              shouldExist: true
            - name: "No shell in image (security)"
              path: "/bin/sh"
              shouldExist: true
          metadataTests:
            - user: "mcp"
              entrypoint: ["${{ matrix.server }}"]
          EOF

      - name: Run structure tests
        run: |
          container-structure-test test \
            --image local/${{ matrix.server }}:test \
            --config structure-test.yml \
            --output text
