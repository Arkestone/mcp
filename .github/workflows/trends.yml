name: Metrics Trends

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CGO_ENABLED: '0'
  GOFLAGS: '-buildvcs=false'

jobs:
  benchmarks:
    name: Benchmark Trend
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-benchmarks
      cancel-in-progress: false  # Never cancel: would corrupt gh-pages history
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=3 -run='^$' ./... 2>&1 | tee benchmark.txt

      - name: Check for benchmark results
        id: check
        run: |
          if grep -q '^Benchmark' benchmark.txt; then
            echo "has_benchmarks=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_benchmarks=false" >> "$GITHUB_OUTPUT"
            echo "No benchmark functions found — trend storage skipped"
          fi

      - name: Bootstrap gh-pages if missing
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            HEAD=$(git rev-parse HEAD)
            git checkout --orphan gh-pages
            git rm -rf . > /dev/null 2>&1 || true
            git commit --allow-empty -m "chore: initialize gh-pages branch"
            git push origin gh-pages
            git checkout "$HEAD"
          fi

      - name: Store benchmark result
        if: steps.check.outputs.has_benchmarks == 'true'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Go Benchmarks
          tool: go
          output-file-path: benchmark.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '120%'
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: dev/bench

  binary-sizes:
    name: Binary Size Tracking
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-binary-sizes
      cancel-in-progress: false  # Never cancel: would corrupt gh-pages history
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build all servers (stripped)
        run: |
          mkdir -p dist
          for server in mcp-instructions mcp-skills mcp-adr mcp-memory mcp-prompts mcp-graph; do
            echo "Building $server..."
            go build -ldflags="-s -w" -o "dist/$server" "./servers/$server/cmd/$server"
          done

      - name: Measure and record binary sizes
        run: |
          python3 << 'PYEOF'
          import os, json
          servers = ['mcp-instructions', 'mcp-skills', 'mcp-adr', 'mcp-memory', 'mcp-prompts', 'mcp-graph']
          results = []
          for s in servers:
              size_bytes = os.path.getsize(f'dist/{s}')
              size_mb = round(size_bytes / (1024 * 1024), 3)
              results.append({'name': s, 'unit': 'MB', 'value': size_mb})
              print(f'{s}: {size_mb} MB ({size_bytes:,} bytes)')
          with open('binary-sizes.json', 'w') as f:
              json.dump(results, f, indent=2)
          PYEOF

      - name: Bootstrap gh-pages if missing
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            HEAD=$(git rev-parse HEAD)
            git checkout --orphan gh-pages
            git rm -rf . > /dev/null 2>&1 || true
            git commit --allow-empty -m "chore: initialize gh-pages branch"
            git push origin gh-pages
            git checkout "$HEAD"
          fi

      - name: Store binary size trend
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Binary Sizes
          tool: customSmallerIsBetter
          output-file-path: binary-sizes.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '120%'
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: dev/binary-sizes

      - name: Size summary
        run: |
          echo "### 📏 Binary Sizes" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          for server in mcp-instructions mcp-skills mcp-adr mcp-memory mcp-prompts mcp-graph; do
            SIZE=$(ls -lh dist/$server | awk '{print $5}')
            echo "$server: $SIZE" >> "$GITHUB_STEP_SUMMARY"
          done
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  coverage:
    name: Coverage Trend
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-coverage
      cancel-in-progress: false  # Never cancel: would corrupt gh-pages history
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Extract coverage percentage
        id: cov
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          if [ -z "${TOTAL}" ]; then
            echo "::error::Could not parse total coverage from coverage.out"
            exit 1
          fi
          echo "total=${TOTAL}" >> "$GITHUB_OUTPUT"
          echo "Coverage total: ${TOTAL}%"
          printf '[{"name":"Total Coverage","unit":"%%","value":%s}]\n' "${TOTAL}" > coverage-result.json

      - name: Bootstrap gh-pages if missing
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            HEAD=$(git rev-parse HEAD)
            git checkout --orphan gh-pages
            git rm -rf . > /dev/null 2>&1 || true
            git commit --allow-empty -m "chore: initialize gh-pages branch"
            git push origin gh-pages
            git checkout "$HEAD"
          fi

      - name: Store coverage trend
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Test Coverage
          tool: customBiggerIsBetter
          output-file-path: coverage-result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '97%'
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: dev/coverage

      - name: Coverage summary
        run: echo "### 📊 Coverage ${{ steps.cov.outputs.total }}%" >> "$GITHUB_STEP_SUMMARY"
