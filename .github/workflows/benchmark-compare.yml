name: Benchmark Comparison

on:
  pull_request:

concurrency:
  group: bench-compare-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  CGO_ENABLED: '0'
  GOFLAGS: '-buildvcs=false'

jobs:
  compare:
    name: Benchmark Comparison
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          path: pr

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - uses: actions/setup-go@v5
        with:
          go-version-file: pr/go.mod
          cache: true

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks on base branch
        working-directory: base
        run: |
          go test -bench=. -benchmem -benchtime=2s -count=6 ./... 2>&1 \
            | grep -E "^Benchmark|^---" > /tmp/base.txt || true
          echo "Base benchmarks: $(wc -l < /tmp/base.txt) lines"

      - name: Run benchmarks on PR branch
        working-directory: pr
        run: |
          go test -bench=. -benchmem -benchtime=2s -count=6 ./... 2>&1 \
            | grep -E "^Benchmark|^---" > /tmp/pr.txt || true
          echo "PR benchmarks: $(wc -l < /tmp/pr.txt) lines"

      - name: Compare and post result
        id: compare
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const baseLines = fs.readFileSync('/tmp/base.txt', 'utf8').trim();
            const prLines   = fs.readFileSync('/tmp/pr.txt',   'utf8').trim();

            if (!baseLines || !prLines) {
              console.log('No benchmarks found — skipping comparison.');
              return;
            }

            let comparison = '';
            try {
              comparison = execSync('benchstat /tmp/base.txt /tmp/pr.txt', { encoding: 'utf8' });
            } catch (e) {
              comparison = e.stdout || 'benchstat failed';
            }

            const hasRegression = /\+[1-9][0-9]\./.test(comparison);
            const icon = hasRegression ? '⚠️' : '✅';

            const body = [
              `## ${icon} Benchmark Comparison`,
              '',
              `> PR vs \`${context.payload.pull_request.base.ref}\``,
              '',
              '```',
              comparison.trim(),
              '```',
              '',
              hasRegression
                ? '_⚠️ Possible performance regressions detected (≥ 10%). Please investigate before merging._'
                : '_No significant regressions detected._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.body.includes('Benchmark Comparison') && c.user.login === 'github-actions[bot]'
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
