name: Flaky Test Detection

on:
  schedule:
    - cron: '0 6 * * 0'  # Sunday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  CGO_ENABLED: '0'
  GOFLAGS: '-buildvcs=false'

jobs:
  run:
    name: Test Run ${{ matrix.run }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        run: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest
      - name: Run test suite (attempt ${{ matrix.run }})
        run: gotestsum --junitfile=test-results-${{ matrix.run }}.xml -- -count=1 ./...
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-results-${{ matrix.run }}
          path: test-results-${{ matrix.run }}.xml
          retention-days: 7

  analyze:
    name: Analyze Flakiness
    needs: run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all test results
        if: always()
        uses: actions/download-artifact@v4
        with:
          pattern: flaky-results-*
          merge-multiple: true

      - name: Detect flaky tests
        run: |
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET
          import glob
          import sys
          from collections import defaultdict

          test_results = defaultdict(list)

          for f in sorted(glob.glob('test-results-*.xml')):
              try:
                  tree = ET.parse(f)
                  root = tree.getroot()
                  for suite in root.iter('testsuite'):
                      for case in suite.iter('testcase'):
                          name = f"{suite.get('name', 'unknown')}/{case.get('name', 'unknown')}"
                          failed = case.find('failure') is not None or case.find('error') is not None
                          test_results[name].append(not failed)
              except Exception as e:
                  print(f"Warning: could not parse {f}: {e}")

          flaky = []
          for test, results in test_results.items():
              if len(set(results)) > 1:
                  passes = results.count(True)
                  flaky.append((test, passes, len(results)))

          print(f"Analysed {len(test_results)} tests across {len(glob.glob('test-results-*.xml'))} runs")

          if flaky:
              print(f"\n⚠️  {len(flaky)} flaky test(s) found:")
              for test, passes, total in sorted(flaky):
                  print(f"  FLAKY  {test}  (passed {passes}/{total} runs)")
              sys.exit(1)
          else:
              print(f"✅ No flaky tests detected")
          PYEOF

      - name: Summary
        if: always()
        run: echo "### 🔬 Flaky Test Detection (5 runs)" >> "$GITHUB_STEP_SUMMARY"
