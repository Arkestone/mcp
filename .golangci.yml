linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - gofmt
    - goimports
    - misspell
    - godot
    - gosec
  disable:
    - wrapcheck
    - exhaustruct
    - godox
    - ireturn
    - varnamelen
    - funlen
    - cyclop
    - gocognit
    - maintidx

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
        - funlen
        - gosec
    - path: "cmd/"
      linters:
        - funlen
    # G304: file path from variable — intentional, servers read user-supplied dirs
    - linters: [gosec]
      text: "G304"
    # G115: integer overflow — low risk in this codebase
    - linters: [gosec]
      text: "G115"

linters-settings:
  goimports:
    local-prefixes: github.com/Arkestone/mcp
  misspell:
    locale: US
