  - name_template: ghcr.io/arkestone/mcp-memory:latest
    image_templates:
      - ghcr.io/arkestone/mcp-memory:latest-amd64
      - ghcr.io/arkestone/mcp-memory:latest-arm64
  - name_template: ghcr.io/arkestone/mcp-prompts:{{ .Version }}
    image_templates:
