docker_manifests:
  - name_template: ghcr.io/arkestone/mcp-instructions:{{ .Version }}
    image_templates:
      - ghcr.io/arkestone/mcp-instructions:{{ .Version }}-amd64
      - ghcr.io/arkestone/mcp-instructions:{{ .Version }}-arm64
  - name_template: ghcr.io/arkestone/mcp-instructions:latest
    image_templates:
      - ghcr.io/arkestone/mcp-instructions:latest-amd64
      - ghcr.io/arkestone/mcp-instructions:latest-arm64
  - name_template: ghcr.io/arkestone/mcp-skills:{{ .Version }}
