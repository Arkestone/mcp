version: 2

project_name: mcp

builds:
  - id: mcp-instructions
    main: ./servers/mcp-instructions/cmd/mcp-instructions
    binary: mcp-instructions
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
  - id: mcp-skills
    main: ./servers/mcp-skills/cmd/mcp-skills
    binary: mcp-skills
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
  - id: mcp-adr
    main: ./servers/mcp-adr/cmd/mcp-adr
    binary: mcp-adr
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
  - id: mcp-memory
    main: ./servers/mcp-memory/cmd/mcp-memory
    binary: mcp-memory
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
  - id: mcp-prompts
    main: ./servers/mcp-prompts/cmd/mcp-prompts
    binary: mcp-prompts
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore"
      - "^docs"
      - "^style"

dockers:
  - id: mcp-instructions-amd64
    ids: [mcp-instructions]
    image_templates:
      - ghcr.io/arkestone/mcp-instructions:{{ .Version }}-amd64
      - ghcr.io/arkestone/mcp-instructions:latest-amd64
    use: buildx
    dockerfile: servers/mcp-instructions/Dockerfile
    build_flag_templates:
      - --platform=linux/amd64
    goarch: amd64
  - id: mcp-instructions-arm64
    ids: [mcp-instructions]
    image_templates:
      - ghcr.io/arkestone/mcp-instructions:{{ .Version }}-arm64
      - ghcr.io/arkestone/mcp-instructions:latest-arm64
    use: buildx
    dockerfile: servers/mcp-instructions/Dockerfile
    build_flag_templates:
      - --platform=linux/arm64
    goarch: arm64
  - id: mcp-skills-amd64
