archives:
  - id: archive-mcp-instructions
    ids:
      - mcp-instructions
    builds_info:
      mode: 493
    name_template: '{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - src: license*
      - src: LICENSE*
      - src: readme*
      - src: README*
      - src: changelog*
      - src: CHANGELOG*
  - id: archive-mcp-skills
    ids:
      - mcp-skills
    builds_info:
      mode: 493
    name_template: '{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
