snapshot:
  version_template: '{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}'
checksum:
  name_template: checksums.txt
  algorithm: sha256
dockers_v2:
  - id: mcp-instructions
    ids:
      - mcp-instructions
    dockerfile: servers/mcp-instructions/Dockerfile.goreleaser
    images:
      - ghcr.io/arkestone/mcp-instructions
    tags:
      - '{{ .Version }}'
      - '{{ if not .IsSnapshot }}latest{{ end }}'
    platforms:
      - linux/amd64
      - linux/arm64
    retry:
      attempts: 10
      delay: 10s
      max_delay: 5m0s
    sbom: "true"
  - id: mcp-skills
    ids:
      - mcp-skills
    dockerfile: servers/mcp-skills/Dockerfile.goreleaser
    images:
      - ghcr.io/arkestone/mcp-skills
    tags:
      - '{{ .Version }}'
      - '{{ if not .IsSnapshot }}latest{{ end }}'
    platforms:
      - linux/amd64
      - linux/arm64
    retry:
